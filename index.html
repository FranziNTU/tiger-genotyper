<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tiger Microsatellite Sampler</title>
<style>
  body { font-family: Arial, sans-serif; padding: 1.2rem; max-width: 1200px; margin: auto; }
  h2 { margin: 0 0 0.25rem 0; }
  h3 { margin: 0.75rem 0 0.25rem 0; }
  .hidden { display: none; }
  .controls { margin-bottom: 0.75rem; }
  .pill { display:inline-block; padding:0.25rem 0.5rem; border-radius:999px; background:#eef; margin-right:0.5rem; }
  table { border-collapse: collapse; width: 100%; margin-top: 0.75rem; }
  th, td { border: 1px solid #ccc; padding: 0.35rem; text-align: center; font-size: 0.9rem; }
  th { background: #f6f6f6; }
  button { padding: 0.45rem 0.7rem; margin-right: 0.4rem; }
  input { padding: 0.25rem; width: 5rem; }
  .trace-wrap { display:flex; gap:0.75rem; align-items:center; margin-top:0.5rem; }
  svg { background:#111; border-radius:4px; }
  .note { font-size: 0.85rem; color:#555; }
</style>
</head>
<body>

<h2>Tiger Microsatellite Sampler</h2>

<!-- ADMIN SETUP: PER-GROUP -->
<div id="setup" class="controls">
  <h3>Session setup</h3>
  <div class="note">Enter limits for each group, based on their budgets.</div>
  <table>
    <tr><th>Group</th><th>Max Individuals</th><th>Max Loci</th></tr>
    <tr><td>G1</td><td><input id="G1_ind" type="number" min="1"></td><td><input id="G1_loci" type="number" min="1" max="30"></td></tr>
    <tr><td>G2</td><td><input id="G2_ind" type="number" min="1"></td><td><input id="G2_loci" type="number" min="1" max="30"></td></tr>
    <tr><td>G3</td><td><input id="G3_ind" type="number" min="1"></td><td><input id="G3_loci" type="number" min="1" max="30"></td></tr>
    <tr><td>G4</td><td><input id="G4_ind" type="number" min="1"></td><td><input id="G4_loci" type="number" min="1" max="30"></td></tr>
    <tr><td>G5</td><td><input id="G5_ind" type="number" min="1"></td><td><input id="G5_loci" type="number" min="1" max="30"></td></tr>
    <tr><td>G6</td><td><input id="G6_ind" type="number" min="1"></td><td><input id="G6_loci" type="number" min="1" max="30"></td></tr>
  </table>
  <button id="startBtn">Start sampling</button>
  <button id="resetBtn">Reset session (staff)</button>
</div>

<!-- SAMPLING VIEW -->
<div id="sampling" class="hidden">
  <div class="controls">
    <span class="pill" id="pillGroup"></span>
    <span class="pill" id="pillReserve"></span>
    <span class="pill" id="pillLat"></span>
    <span class="pill" id="pillID"></span>
  </div>

  <div class="trace-wrap">
    <svg width="420" height="90" viewBox="0 0 420 90" aria-label="Chromatogram">
      <polyline id="traceLine" fill="none" stroke="#2ecc71" stroke-width="2" points="" />
    </svg>
    <div class="note">Simulated microsatellite chromatogram</div>
  </div>

  <div class="controls">
    <button id="addBtn">Add individual to dataset</button>
    <button id="csvBtn">Download CSV (wide format)</button>
  </div>

  <table id="table"></table>
</div>

<script>
/**************** MASTER DATA (demo) ****************/
const DB = {
  'KAN_014':{Reserve:'Kanha',Latitude:22.334,Individual:'KAN_014',loci:{MS01:[102,104],MS02:[100,100],MS03:[106,108],MS04:[104,106],MS05:[102,102],MS06:[110,112],MS07:[98,100],MS08:[120,122],MS09:[154,156],MS10:[178,178]}},
  'SIM_003':{Reserve:'Simlipal',Latitude:21.932,Individual:'SIM_003',loci:{MS01:[108,110],MS02:[108,108],MS03:[106,110],MS04:[104,106],MS05:[102,102],MS06:[114,114],MS07:[96,98],MS08:[118,120],MS09:[152,154],MS10:[180,182]}},
  'ZOO_003':{Reserve:'Zoo',Latitude:0.0,Individual:'ZOO_003',loci:{MS01:[102,102],MS02:[100,102],MS03:[104,104],MS04:[106,106],MS05:[102,104],MS06:[110,110],MS07:[98,98],MS08:[120,120],MS09:[154,154],MS10:[178,180]}}
};

/**************** SESSION STATE ****************/
const params = new URLSearchParams(location.search);
const tigerId = params.get('tiger');
const SESSION_READY = localStorage.getItem('session_ready') === 'true';

// If session not configured, ALWAYS show admin setup
if (!SESSION_READY) {
  setup.classList.remove('hidden');
  sampling.classList.add('hidden');
}

/**************** START SAMPLING ****************/
startBtn.onclick = () => {
  ['G1','G2','G3','G4','G5','G6'].forEach(g=>{
    const mi = document.getElementById(g+'_ind').value;
    const ml = document.getElementById(g+'_loci').value;
    if (mi && ml) {
      localStorage.setItem('cfg_'+g, JSON.stringify({maxIndividuals:+mi, maxLoci:+ml}));
    }
  });
  localStorage.setItem('session_ready','true');
  setup.classList.add('hidden');
};

/**************** STAFF RESET ****************/
resetBtn.onclick = () => {
  const code = prompt('Staff code required:');
  if (code !== 'RESET2026') return;
  Object.keys(localStorage).forEach(k=>localStorage.removeItem(k));
  alert('Session reset.');
  location.href = location.pathname;
};

/**************** GROUP + SAMPLING ****************/
if (SESSION_READY && tigerId && DB[tigerId]) {
  let groupId = localStorage.getItem('groupId');
  if (!groupId) {
    groupId = prompt('Enter your group ID (G1–G6):');
    localStorage.setItem('groupId', groupId);
  }
  const cfg = JSON.parse(localStorage.getItem('cfg_'+groupId));
  if (!cfg) {
    alert('Limits not set for your group.');
  } else {
    sampling.classList.remove('hidden');
    setup.classList.add('hidden');
    pillGroup.textContent='Group: '+groupId;
    const row=DB[tigerId];
    pillReserve.textContent='Reserve: '+row.Reserve;
    pillLat.textContent='Latitude: '+row.Latitude;
    pillID.textContent='Individual: '+row.Individual;

    const DATA_KEY='dataset_'+groupId;
    let dataset=JSON.parse(localStorage.getItem(DATA_KEY)||'[]');

    animateTrace();
    renderTable();

    addBtn.onclick=()=>{
      if(dataset.length>=cfg.maxIndividuals){alert('Individual limit reached');return;}
      if(dataset.find(d=>d.Individual===tigerId)){alert('Already added');return;}
      const loci=Object.keys(row.loci).slice(0,cfg.maxLoci);
      const rec={Reserve:row.Reserve,Latitude:row.Latitude,Individual:row.Individual};
      loci.forEach(k=>{rec[k+'_A']=row.loci[k][0];rec[k+'_B']=row.loci[k][1];});
      dataset.push(rec);
      localStorage.setItem(DATA_KEY,JSON.stringify(dataset));
      renderTable();
    };

    csvBtn.onclick=()=>{
      if(!dataset.length){alert('No data');return;}
      const cols=Object.keys(dataset[0]);
      let csv=cols.join(',')+'\n';
      dataset.forEach(r=>{csv+=cols.map(c=>r[c]).join(',')+'\n';});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
      a.download=groupId+'_tiger_microsatellites_wide.csv';
      a.click();
    };

    function renderTable(){
      table.innerHTML='';
      if(!dataset.length){table.innerHTML='<tr><td>No data yet</td></tr>';return;}
      const cols=Object.keys(dataset[0]);
      table.innerHTML='<tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr>'+
        dataset.map(r=>'<tr>'+cols.map(c=>'<td>'+r[c]+'</td>').join('')+'</tr>').join('');
    }
  }
}

/**************** CHROMATOGRAM ****************/
function animateTrace(){
  const pts=[];let x=0,phase=0;traceLine.setAttribute('points','');
  (function tick(){
    if(x>420)return;
    pts.push(x+','+(45+Math.sin(phase)*(10+Math.random()*6)).toFixed(1));
    traceLine.setAttribute('points',pts.join(' '));
    x+=6;phase+=0.3;requestAnimationFrame(tick);
  })();
}
</script>
</body>
</html>
