<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tiger Microsatellite Sampler</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 1.2rem;
  max-width: 1200px;
  margin: auto;
}
.hidden { display: none; }
.controls { margin: 0.6rem 0; }
h2,h3,h4 { margin-bottom: 0.4rem; }

.pill {
  display:inline-block;
  padding:0.25rem 0.6rem;
  border-radius:999px;
  background:#eef;
  margin-right:0.5rem;
}

button {
  padding:0.45rem 0.9rem;
  margin-right:0.4rem;
}

table {
  border-collapse:collapse;
  width:100%;
  margin-top:0.6rem;
}
th, td {
  border:1px solid #ccc;
  padding:0.35rem;
  text-align:center;
}
th { background:#f5f5f5; }

svg { background:#111; border-radius:4px; }

.warning {
  background:#fff3cd;
  border:1px solid #ffeeba;
  padding:0.8rem;
}
.success {
  background:#e6fffa;
  border:1px solid #b2f5ea;
  padding:0.8rem;
}
</style>
</head>

<body>

<h2>Tiger Microsatellite Sampler</h2>

<!-- ================= ADMIN ================= -->
<div id="admin" class="hidden">
  <h3>Session setup (staff)</h3>
  <p>Enter limits for each group based on their budgets.</p>

  <table>
    <tr>
      <th>Group</th><th>Max individuals</th><th>Max loci</th>
    </tr>
    <tr><td>G1</td><td><input id="G1_i" type="number"></td><td><input id="G1_l" type="number"></td></tr>
    <tr><td>G2</td><td><input id="G2_i" type="number"></td><td><input id="G2_l" type="number"></td></tr>
    <tr><td>G3</td><td><input id="G3_i" type="number"></td><td><input id="G3_l" type="number"></td></tr>
    <tr><td>G4</td><td><input id="G4_i" type="number"></td><td><input id="G4_l" type="number"></td></tr>
    <tr><td>G5</td><td><input id="G5_i" type="number"></td><td><input id="G5_l" type="number"></td></tr>
    <tr><td>G6</td><td><input id="G6_i" type="number"></td><td><input id="G6_l" type="number"></td></tr>
  </table>

  <div class="controls">
    <button id="startSampling">Start sampling</button>
    <button id="resetSession">Reset session (staff)</button>
  </div>
  <div id="adminMsg" class="success hidden"></div>
</div>

<!-- ================= WAIT ================= -->
<div id="wait" class="warning hidden">
  <strong>Sampling not yet started.</strong><br>
  Please wait for your instructor.
  <div class="controls">
    <button id="resetMyGroup1">Reset my group (this device)</button>
  </div>
</div>

<!-- ================= SAMPLING ================= -->
<div id="sampling" class="hidden">

  <h3>Currently sampling</h3>
  <div class="controls">
    <span class="pill" id="pillGroup"></span>
    <span class="pill" id="pillTiger"></span>
    <button id="resetMyGroup2">Reset my group</button>
  </div>

  <svg width="420" height="90" viewBox="0 0 420 90">
    <polyline id="chromTrace" fill="none" stroke="#2ecc71" stroke-width="2"></polyline>
  </svg>

  <table id="currentTable"></table>

  <div class="controls">
    <button id="addBtn">Add this individual</button>
    <button id="csvBtn">Download CSV</button>
  </div>

  <h4>Dataset already collected by your group</h4>
  <table id="dataTable"></table>
</div>

<script>
/* ================= MASTER DATA ================= */

const DB = {
  KAN_014: {
    Reserve: 'Kanha',
    Latitude: 22.334,
    loci: {
      MS01:[102,104], MS02:[100,100], MS03:[106,108], MS04:[104,106],
      MS05:[102,102], MS06:[110,112], MS07:[98,100], MS08:[120,122],
      MS09:[154,156], MS10:[178,178]
    }
  },
  SIM_003: {
    Reserve: 'Simlipal',
    Latitude: 21.93,
    loci: {
      MS01:[108,110], MS02:[108,108], MS03:[106,110], MS04:[104,106],
      MS05:[102,102], MS06:[114,114], MS07:[96,98], MS08:[118,120],
      MS09:[152,154], MS10:[180,182]
    }
  }
};

/* ================= ROUTING ================= */

const params = new URLSearchParams(location.search);
const tigerId = params.get('tiger');
const sessionReady = localStorage.getItem('session_ready') === 'true';

function show(el){ el.classList.remove('hidden'); }
function hide(el){ el.classList.add('hidden'); }

hide(admin); hide(wait); hide(sampling);

if (!tigerId) show(admin);
else if (!sessionReady) show(wait);
else samplingEntry();

/* ================= ADMIN ================= */

startSampling.onclick = () => {
  ['G1','G2','G3','G4','G5','G6'].forEach(g => {
    const i = document.getElementById(g+'_i').value;
    const l = document.getElementById(g+'_l').value;
    if (i && l) {
      localStorage.setItem('cfg_'+g, JSON.stringify({ maxIndividuals:+i, maxLoci:+l }));
    }
  });
  localStorage.setItem('session_ready','true');
  adminMsg.textContent = '✅ Sampling started. Students may now scan QR codes.';
  show(adminMsg);
};

resetSession.onclick = () => {
  if (prompt('Staff code') !== 'RESET2026') return;
  localStorage.clear();
  alert('✅ Session reset complete.');
  location.reload();
};

/* ================= SAMPLING ================= */

function samplingEntry() {
  let group = localStorage.getItem('groupId');
  if (!group) {
    group = prompt('Enter your group ID (G1–G6)');
    localStorage.setItem('groupId', group);
  }

  const cfg = JSON.parse(localStorage.getItem('cfg_'+group) || 'null');
  if (!cfg) { show(wait); return; }

  show(sampling);
  pillGroup.textContent = 'Group: ' + group;
  pillTiger.textContent = 'Tiger: ' + tigerId;

  const src = DB[tigerId];
  const loci = Object.keys(src.loci).slice(0, cfg.maxLoci);

  renderCurrent(src, loci);
  animateChrom();

  const DATA_KEY = 'dataset_'+group;
  let dataset = JSON.parse(localStorage.getItem(DATA_KEY) || '[]');
  renderDataset();

  addBtn.onclick = () => {
    if (dataset.length >= cfg.maxIndividuals) return alert('Individual limit reached');
    if (dataset.find(d => d.Individual === tigerId)) return alert('Already sampled');

    const rec = { Reserve:src.Reserve, Latitude:src.Latitude, Individual:tigerId };
    loci.forEach(l => {
      const [a,b] = src.loci[l];
      rec[l+'_A'] = a;
      rec[l+'_B'] = b;
    });

    dataset.push(rec);
    localStorage.setItem(DATA_KEY, JSON.stringify(dataset));
    renderDataset();
  };

  csvBtn.onclick = () => {
    if (!dataset.length) return;
    const cols = Object.keys(dataset[0]);
    let csv = cols.join(',') + '\n';
    dataset.forEach(r => csv += cols.map(c => r[c]).join(',') + '\n');

    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv]));
    a.download = group + '_tiger_genotypes.csv';
    a.click();
  };

  function renderCurrent(src, loci) {
    currentTable.innerHTML = '<tr><th>Locus</th><th>Allele A</th><th>Allele B</th></tr>';
    loci.forEach(l => {
      const [a,b] = src.loci[l];
      currentTable.innerHTML += `<tr><td>${l}</td><td>${a}</td><td>${b}</td></tr>`;
    });
  }

  function renderDataset() {
    dataTable.innerHTML = '';
